specVersion: "3.0"
metadata:
  name: com.nalet.katalog
type: application
framework:
  name: SAPUI5
  version: "1.144.0"
  libraries:
    - name: sap.ui.core
    - name: sap.m
    - name: sap.f
    - name: sap.fe.templates
    - name: sap.ui.mdc
    - name: sap.ui.layout
    - name: themelib_sap_horizon
resources:
  configuration:
    paths:
      webapp: webapp
builder:
  resources:
    excludes:
      - "/**/*.ts"
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        transformTypeScript: true
        transformAsyncToPromise: true
        omitTSFromBuildResult: true
server:
  customMiddleware:
    - name: ui5-tooling-transpile-middleware
      afterMiddleware: compression
      configuration:
        transformTypeScript: true
        transformAsyncToPromise: true
