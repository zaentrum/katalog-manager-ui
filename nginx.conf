# nginx config for the katalog-manager-ui static bundle.
#
# Only one server stanza — the container listens on 8080 (set by the
# nginx-unprivileged base image's UID 101). All traffic enters through
# the launchpad reverse proxy; this server never sees a host header
# beyond its own in-cluster service name, so no SNI / virtual-host
# routing is needed.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Health endpoint for kubelet probes. nginx replies with the
    # status code before touching the filesystem so a missing dist/
    # still answers OK while we debug a bad build.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # UI5 emits version-stamped immutable resource paths under
    # `resources/`; serve them with a 1-year cache + immutable hint
    # so browsers don't ETag-check on every navigation.
    location ^~ /resources/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The launchpad tile registrations + the legacy Spring Boot layout
    # both expect the SAPUI5 component to live under /katalog/* (e.g.
    # /proxy/katalog/katalog/Component.js → /katalog/Component.js here).
    # The ui5 build writes everything to /usr/share/nginx/html/ flat, so
    # alias `/katalog/` back to the doc root. Without this the launchpad
    # hits `script load error` on Component.js with a text/html MIME
    # response (nginx falling back to /index.html via the SPA route).
    location ^~ /katalog/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # Component-preload bundles, i18n properties, and the rest of the
    # SPA assets. Default 1-hour cache; the manifest.json revision
    # query string busts as needed.
    location / {
        gzip on;
        gzip_types
            application/javascript
            application/json
            application/manifest+json
            text/css
            text/html
            text/plain
            text/xml
            image/svg+xml;
        gzip_min_length 1024;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        # Standard SPA fallback. If a deep-link URL doesn't match a
        # file (e.g. `#Movies-list` is a hash route handled in-browser),
        # serve index.html and let the SAPUI5 router pick it up.
        try_files $uri $uri/ /index.html;
    }
}
